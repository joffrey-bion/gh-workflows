name: dependabot-pr-post-processing

# Requirements:
#   * "Allow auto-merge" setting must be ticked, and at least one check should be present

on:
  workflow_call:
    inputs:
      internal-dependencies:
        description: |
          A list of individual dependencies that should be considered internal (not relevant to users).
          A PR is considered internal if ALL of its dependencies are in this list (even
          when its dependency group doesn't match one of `internal-dependency-groups`).
          Internal PRs get the label defined by `internal-label` and are auto-merged.
          The list should be provided as a multiline string, one dependency name per line in the Dependabot format
          (`group:artifact` for Gradle dependencies, `pluginId` for Gradle plugins).
          Entries may use glob patterns (`*`, `?`, `[...]`) to match multiple dependencies at once, for example
          `org.jetbrains.kotlin:*` to match all artifacts in the `org.jetbrains.kotlin` group.
        required: false
        type: string
        default: ''
      internal-dependency-groups:
        description: |
          A list of Dependabot dependency groups that should be considered internal (not relevant to users).
          A PR is considered internal if its dependency group matches one of these groups, even if some of the 
          updated dependencies are not in 'internal-dependencies', so you don't have to list dependencies from groups.
          Internal PRs get the label defined by `internal-label` and are auto-merged.
          The list should be provided as a multiline string, one group name per line.
        required: false
        type: string
        default: ''
      internal-label:
        description: |
          The name of the label to apply to internal PRs. The label is created automatically if it
          doesn't already exist in the repository.
        type: string
        required: false
        default: internal
      update-kotlin-lock-files:
        description: Whether to update Kotlin/JS and Kotlin/Wasm lock files when updating Kotlin-related dependencies.
        required: false
        type: boolean
        default: true
      update-kotlin-lock-files-command:
        description: |
          The command to run to update lock files. By default it runs Gradle tasks that update Yarn lock 
          files for both JS and Wasm.
        type: string
        required: false
        default: ./gradlew kotlinUpgradeYarnLock kotlinWasmUpgradeYarnLock
      gradle-jdk-version:
        description: The JDK to use to run Gradle.
        type: number
        required: false
        default: 17
    secrets:
      github-token:
        description: |
          A GitHub token with the permissions `contents: write` (to commit updated lock files) and 
          `pull-requests: write` (to label them).
        required: true

jobs:
  metadata:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    outputs:
      dependency-names: ${{ steps.metadata.outputs.dependency-names }}
      dependency-group: ${{ steps.metadata.outputs.dependency-group }}
      is-internal: ${{ steps.internal-check.outputs.is-internal }}
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ github.token }}

      - name: List dependencies
        env:
          DEPENDENCY_GROUP: ${{ steps.metadata.outputs.dependency-group }}
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
        run: |
          echo "Dependency group: $DEPENDENCY_GROUP"
          echo "Dependency names: $DEPENDENCY_NAMES"
          {
            echo "### Dependabot metadata for this PR"
            echo ""
            echo "Dependency group: \`$DEPENDENCY_GROUP\`"
            echo ""
            echo "Dependency names:"
            echo ""
            # DEPENDENCY_NAMES is a comma-separated list (see fetch-metadata output).
            IFS=',' read -ra names <<< "$DEPENDENCY_NAMES"
            for d in "${names[@]}"; do
              d="$(echo "$d" | xargs)" # trim surrounding whitespace
              [[ -n "$d" ]] && echo "- \`$d\`"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Determine whether the PR is internal
        id: internal-check
        env:
          DEPENDENCY_GROUP: ${{ steps.metadata.outputs.dependency-group }}
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          INTERNAL_GROUPS: ${{ inputs.internal-dependency-groups }}
          INTERNAL_DEPS: ${{ inputs.internal-dependencies }}
        run: |
          is_internal=false

          # 1. The PR is internal if its dependency group matches one of the internal groups.
          if [[ -n "$DEPENDENCY_GROUP" ]]; then
            while IFS= read -r group; do
              group="$(echo "$group" | xargs)" # trim surrounding whitespace
              if [[ -n "$group" && "$group" == "$DEPENDENCY_GROUP" ]]; then
                is_internal=true
                break
              fi
            done <<< "$INTERNAL_GROUPS"
          fi

          # 2. Otherwise, the PR is internal if ALL its dependencies are internal.
          #    Any dependency that is not internal is "user-visible" and prevents auto-merge.
          external_deps=""
          if [[ "$is_internal" != "true" ]]; then
            dep_count=0
            IFS=',' read -ra deps <<< "$DEPENDENCY_NAMES"
            for dep in "${deps[@]}"; do
              dep="$(echo "$dep" | xargs)" # trim surrounding whitespace
              [[ -z "$dep" ]] && continue
              dep_count=$((dep_count + 1))

              found=false
              while IFS= read -r internal_dep; do
                internal_dep="$(echo "$internal_dep" | xargs)" # trim surrounding whitespace
                # The right-hand side is left unquoted on purpose so that entries can use
                # glob patterns (e.g. 'org.jetbrains.kotlin:*') to match multiple dependencies.
                if [[ -n "$internal_dep" && "$dep" == $internal_dep ]]; then
                  found=true
                  break
                fi
              done <<< "$INTERNAL_DEPS"

              if [[ "$found" != "true" ]]; then
                external_deps+="${dep}"$'\n'
              fi
            done

            # Only mark as internal-by-dependencies if there was at least one dependency
            # and none of them were user-visible.
            if [[ "$dep_count" -gt 0 && -z "$external_deps" ]]; then
              is_internal=true
            fi
          fi

          echo "is-internal=$is_internal" >> "$GITHUB_OUTPUT"

          if [[ "$is_internal" != "true" && -n "$external_deps" ]]; then
            echo "This PR is not considered internal because the following user-visible dependencies are not in the internal dependencies list:"
            echo "$external_deps"
            {
              echo "### PR not marked as internal"
              echo ""
              echo "The dependency group did not match, and the following user-visible dependencies are not in the internal dependencies list:"
              echo ""
              while IFS= read -r d; do
                [[ -n "$d" ]] && echo "- \`$d\`"
              done <<< "$external_deps"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          # A non-internal PR is a normal outcome, not a failure. Ensure the step exits
          # successfully regardless of the exit code of the last command above.
          exit 0

  internal-deps:
    needs: metadata
    if: needs.metadata.outputs.is-internal == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Add the internal label and enable auto-merge for internal deps
        env:
          GH_TOKEN: ${{ secrets.github-token }}
          GH_REPO: ${{ github.repository }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          LABEL: ${{ inputs.internal-label }}
        run: |
          # Create the label if it doesn't already exist. We check explicitly (rather than
          # swallowing a "label already exists" error) so genuine failures still surface.
          if ! gh label list --search "$LABEL" --json name --jq '.[].name' | grep -qxF "$LABEL"; then
            gh label create "$LABEL" --description "Issues and PRs that shouldn't appear in the change log"
          fi
          gh pr edit "$PR_URL" --add-label "$LABEL"
          gh pr merge "$PR_URL" --auto --rebase

  update-locks:
    needs: metadata
    # Example dependencies we want to trigger on:
    #   org.jetbrains.kotlin.jvm
    #   org.jetbrains.kotlin.multiplatform
    #   org.jetbrains.kotlin.plugin.serialization
    #   org.jetbrains.kotlin:kotlinx-atomicfu-runtime
    #   multiplatform - when used with the shortcut kotlin("mutliplatform")
    #   plugin.serialization - when used with the shortcut kotlin("plugin.serialization")
    #   io.ktor:ktor-kotlinx-serialization-json
    # It's ok to trigger on more dependencies than we want, it just will not result in any
    # lock file changes, and be a no-op.
    if: >-
      inputs.update-kotlin-lock-files && (
        contains(needs.metadata.outputs.dependency-names, 'kotlin') ||
        contains(needs.metadata.outputs.dependency-names, 'multiplatform') ||
        contains(needs.metadata.outputs.dependency-names, 'plugin.serialization')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          # Important: checkout the PR head, not merge commit
          ref: ${{ github.event.pull_request.head.ref }}
          # Use the passed-in token so the push has write access AND re-triggers CI
          # (a push made with the default GITHUB_TOKEN does not trigger other workflows)
          token: ${{ secrets.github-token }}

      - name: Set up JDK ${{ inputs.gradle-jdk-version }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.gradle-jdk-version }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Update Yarn lock files for Kotlin/JS and Kotlin/Wasm
        run: ${{ inputs.update-kotlin-lock-files-command }}

      - name: Commit changes (if any)
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add kotlin-js-store
            git commit -m "Update yarn lock files after Kotlin-related bump"
            git push
          else
            echo "No changes to commit"
          fi
